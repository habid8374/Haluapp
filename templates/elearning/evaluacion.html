{% extends "base_academico.html" %}
{% block contenido %}
<div class="container mt-4">
    <h1 class="h5 mb-3">{{ evaluacion.titulo }}</h1>
    <form method="post">{% csrf_token %}
        {% for pregunta in evaluacion.preguntas.all %}
        <div class="card mb-3">
            <div class="card-body">
                <p class="fw-semibold">{{ pregunta.texto }}</p>
                {% for opcion in pregunta.opciones.all %}
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="pregunta_{{ pregunta.id }}" value="{{ opcion.id }}" id="o{{ opcion.id }}">
                    <label class="form-check-label" for="o{{ opcion.id }}">{{ opcion.texto }}</label>
                </div>
                {% endfor %}
            </div>
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Enviar respuestas</button>
        <a href="{% url 'elearning:aula_virtual' evaluacion.modulo.curso.id %}" class="btn btn-link">Volver al aula</a>
    </form>
</div>
{% endblock %}
