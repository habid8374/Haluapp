<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Certificado</title>
    <style>
        body { font-family: DejaVu Sans, sans-serif; padding: 2rem; }
        h1 { font-size: 1.4rem; }
        .muted { color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>Certificado de participación</h1>
    <p><strong>Institución:</strong> {{ institucion.nombre }}</p>
    <p><strong>Participante:</strong> {{ estudiante.usuario.get_full_name|default:estudiante.usuario.username }}</p>
    <p><strong>Oferta:</strong> {{ curso.nombre }}</p>
    <p><strong>Duración declarada (horas):</strong> {{ curso.duracion_horas }}</p>
    <p class="muted">Emitido el {{ fecha|date:"d/m/Y H:i" }}.</p>
</body>
</html>
