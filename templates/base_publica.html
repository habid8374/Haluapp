{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}{{ branding.NOMBRE }}{% endblock %}</title>

    <!-- Los mismos estilos que tu base.html -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Puedes copiar los estilos de tu base.html aquí si quieres mantener la misma apariencia */
        :root {
            --color-fondo-cuerpo: #f0f4f8; 
            --color-fondo-contenido: #ffffff; 
            --color-texto-principal: #2a3342;
            --fuente-principal: 'Roboto', sans-serif; 
            --fuente-titulos: 'Nunito', sans-serif;
            --windows-azul: #0078D4;
        }
        body { background-color: var(--color-fondo-cuerpo); color: var(--color-texto-principal); font-family: var(--fuente-principal); }
        .top-navbar { background-color: var(--windows-azul) !important; }
        .navbar-brand img.logo-navbar { max-height: 35px; margin-right: 10px; }
        .navbar-brand { font-weight: 700; color: #ffffff !important; font-family: var(--fuente-titulos); font-size: 1.25rem; }
    </style>
</head>
<body>
    
    <!-- Una navbar mucho más simple, solo con la marca -->
    <nav class="navbar navbar-dark shadow-sm top-navbar">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="{% static branding.LOGO_URL %}" alt="Logo {{ branding.NOMBRE }}" class="logo-navbar">
                {{ branding.NOMBRE }}
            </a>
        </div>
    </nav>

    <!-- El contenedor principal donde se insertará el contenido del portal -->
    <main class="container-fluid py-5">
        {% block contenido %}
            <!-- El contenido de portal_postulante.html irá aquí -->
        {% endblock %}
    </main>

    <footer class="text-center py-3">
        <p class="mb-0 text-muted">© {% now "Y" %} {{ branding.NOMBRE }}</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Dejamos el bloque por si alguna página pública necesita JS extra -->
    {% block extra_js %}{% endblock %}

</body>
</html>
