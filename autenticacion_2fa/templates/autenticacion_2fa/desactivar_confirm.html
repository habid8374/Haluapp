{% extends "base_academico.html" %}

{% block titulo %}Desactivar 2FA{% endblock %}

{% block contenido %}
<div class="container mt-5" style="max-width:460px;">
  <div class="card shadow-sm border-0 rounded-4 p-4 text-center">
    <i class="bi bi-shield-exclamation text-warning" style="font-size:3rem;"></i>
    <h4 class="mt-3 fw-bold">¿Desactivar autenticación de dos factores?</h4>
    <p class="text-muted">Tu cuenta quedará protegida solo con contraseña. Se recomienda mantener el 2FA activo.</p>
    <form method="post" class="d-flex gap-2 justify-content-center mt-3">
      {% csrf_token %}
      <a href="{% url '2fa:configurar' %}" class="btn btn-outline-secondary">Cancelar</a>
      <button type="submit" class="btn btn-danger">
        <i class="bi bi-shield-x me-1"></i>Sí, desactivar
      </button>
    </form>
  </div>
</div>
{% endblock %}
