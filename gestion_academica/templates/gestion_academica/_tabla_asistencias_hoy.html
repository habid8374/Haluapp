<table class="table table-sm table-bordered table-hover">
    <thead class="table-light">
        <tr>
            <th>Docente</th>
            <th>Hora</th>
            <th>Estado</th>
        </tr>
    </thead>
    <tbody>
        {% for a in asistencias_hoy %}
        <tr>
            <td>{{ a.docente.usuario.get_full_name }}</td>
            <td>{{ a.fecha|date:"H:i:s" }}</td>
            <td><span class="badge bg-success">{{ a.estado }}</span></td>
        </tr>
        {% empty %}
        <tr><td colspan="3" class="text-center text-muted">Aún no hay asistencias hoy.</td></tr>
        {% endfor %}
    </tbody>
</table>
