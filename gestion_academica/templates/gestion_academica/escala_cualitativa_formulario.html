{% extends "base_academico.html" %}
{% load crispy_forms_tags %}

{% block titulo %}{{ titulo_formulario }}{% endblock %}

{% block contenido %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h4 class="mb-0">{{ titulo_formulario }}</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <hr>
                        <div class="d-flex justify-content-end">
                            <a href="{% url 'gestion_academica:lista_escala_cualitativa' %}" class="btn btn-secondary me-2">Cancelar</a>
                            <button type="submit" class="btn btn-success">Guardar Cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
